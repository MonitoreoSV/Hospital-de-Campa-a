<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<meta name="theme-color" content="#0f2230">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Misión Humanitaria — Hospital de Campaña</title>
<style>
:root{
  --tinta:#0f2230; --panel:#ffffff; --fondo:#eaeef1; --linea:#d3dbe0;
  --azul:#146094; --rojo:#c62828; --amarillo:#e8a000; --verde:#2e7d32;
  --morado:#5e35b1; --gris:#5c6b78;
}
*{box-sizing:border-box; margin:0; -webkit-tap-highlight-color:rgba(20,96,148,.15)}
html,body{margin:0; background:var(--fondo)}
body{font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif; color:var(--tinta); -webkit-text-size-adjust:100%}
input,select,textarea,button{font-family:inherit}
button{touch-action:manipulation}

/* Login */
.login-wrap{min-height:100vh; background:radial-gradient(circle at 50% 0%,#16344a,#0b1a26); display:flex; align-items:center; justify-content:center; padding:20px}
.login-card{background:var(--panel); border-radius:16px; padding:30px 26px; width:100%; max-width:360px; box-shadow:0 20px 60px rgba(0,0,0,.35); text-align:center}
.login-cruz{width:52px; height:52px; margin:0 auto 10px; border-radius:14px; background:var(--rojo); color:#fff; font-size:30px; font-weight:800; display:flex; align-items:center; justify-content:center}
.login-card h1{font-size:19px}
.login-sub{font-size:12px; color:var(--gris); margin-top:2px}
.login-card form{margin-top:18px; text-align:left}
.login-hint{margin-top:18px; font-size:11px; color:var(--gris); line-height:1.7; border-top:1px solid var(--linea); padding-top:12px}
.conn{margin-top:12px; font-size:11px; padding:7px 9px; border-radius:7px}
.conn.local{background:#fff7e6; color:#8a6100; border:1px solid #f0dcae}
.conn.sheet{background:#e6f4e8; color:#1d5622; border:1px solid #bfe0c3}

/* Topbar */
.topbar{background:var(--tinta); color:#fff; display:flex; justify-content:space-between; align-items:center; padding:10px 16px; gap:12px}
.brand{display:flex; align-items:center; gap:10px}
.brand-cruz{width:34px; height:34px; border-radius:9px; background:var(--rojo); display:flex; align-items:center; justify-content:center; font-weight:800; font-size:19px}
.brand-t{font-size:15px; font-weight:700; letter-spacing:.2px}
.brand-s{font-size:11px; color:#9db2c2}
.user{text-align:right; display:flex; flex-direction:column; align-items:flex-end; gap:1px}
.user-n{font-size:13px; font-weight:600}
.user-r{font-size:11px; color:#9db2c2}
.salir{margin-top:4px; background:#22394a; color:#cfe0ee; border:1px solid #33506a; border-radius:7px; padding:5px 12px; font-size:12px; font-weight:600; cursor:pointer}
.salir:hover{background:#2b475d}

/* Nav módulos */
.modtabs{display:flex; background:var(--panel); border-bottom:2px solid var(--linea); overflow-x:auto; position:sticky; top:0; z-index:5}
.modtabs button{flex:0 0 auto; border:0; background:none; padding:12px 16px; font-size:13px; font-weight:600; color:var(--gris); cursor:pointer; border-bottom:3px solid transparent; white-space:nowrap; display:flex; align-items:center; gap:6px}
.modtabs button.activa{color:var(--azul); border-bottom-color:var(--azul)}
.mt-ic{font-size:15px}

/* Contenido */
.contenido{max-width:680px; margin:0 auto; padding:14px 12px}
.tarjeta{background:var(--panel); border:1px solid var(--linea); border-radius:12px; padding:16px; margin-bottom:14px}
.tarjeta h2{font-size:15px; margin-bottom:4px}
.desc{font-size:12px; color:var(--gris); margin-bottom:12px}
.mut{color:var(--gris); font-weight:400}
label{display:block; font-size:12px; font-weight:600; margin:12px 0 4px}
input,select,textarea{width:100%; padding:12px 10px; font-size:16px; border:1px solid var(--linea); border-radius:8px; background:#fbfcfd}
textarea{min-height:60px; resize:vertical}
input:focus,select:focus,textarea:focus{outline:2px solid var(--azul); border-color:var(--azul)}
.cant,.kpi b,.tiempo b,.stock-fila .cant{font-variant-numeric:tabular-nums}
.fila{display:grid; grid-template-columns:1fr 1fr; gap:10px}
.fila3{display:grid; grid-template-columns:repeat(3,1fr); gap:8px}
.btn{width:100%; margin-top:18px; padding:14px; font-size:15px; font-weight:700; color:#fff; background:var(--azul); border:0; border-radius:8px; cursor:pointer}
.btn:hover{filter:brightness(1.06)}
.btn-refrescar{width:auto; padding:9px 13px; font-size:13px; background:#e8edf1; color:var(--azul); border:1px solid var(--linea); border-radius:8px; font-weight:700; cursor:pointer}
.btn-mini{width:auto; padding:6px 12px; font-size:12px; font-weight:700; border-radius:999px; border:1px solid var(--linea); background:#eef4f9; color:var(--azul); cursor:pointer}
.aviso{margin-top:14px; padding:12px; border-radius:8px; font-size:13px; display:none}
.aviso.ok{display:block; background:#e6f4e8; color:#1d5622; border:1px solid #bfe0c3}
.aviso.error{display:block; background:#fdeaea; color:#8c1c1c; border:1px solid #f2c4c4}
.aviso.info{display:block; background:#e8f1f8; color:#0f3a5c; border:1px solid #c3d9ea}

/* Sub-pestañas */
.subtabs{display:flex; gap:4px; margin-bottom:12px; overflow-x:auto}
.subtabs button{flex:0 0 auto; border:1px solid var(--linea); background:var(--panel); padding:9px 13px; font-size:12.5px; font-weight:600; color:var(--gris); cursor:pointer; border-radius:8px; white-space:nowrap}
.subtabs button.activa{color:#fff; background:var(--azul); border-color:var(--azul)}

/* Checks ingreso */
.check{display:flex; align-items:center; gap:10px; margin-top:10px; padding:12px; border-radius:8px; font-size:14px; cursor:pointer; font-weight:500}
.check b{font-weight:800}
.check input{width:20px; height:20px}
.check.amarilla{background:#fff7e6; border:1px solid #f0dcae}
.check.rosa{background:#fce4ec; border:1px solid #f8bbd0}
.repbox{margin-top:14px; padding:14px; border:2px dashed var(--azul); border-radius:10px; background:#f4f8fb}

/* Buscador */
.buscador{position:relative}
.buscador .selector{display:flex}
.buscador .selector>input{flex:1}
.sugerencias{position:absolute; left:0; right:0; top:100%; z-index:20; background:#fff; border:1px solid var(--linea); border-radius:0 0 10px 10px; box-shadow:0 8px 18px rgba(15,34,47,.15); max-height:260px; overflow-y:auto}
.sugerencias div{padding:12px 10px; font-size:14px; border-bottom:1px solid #f0f2f4; cursor:pointer}
.sugerencias div:hover{background:#eef4f9}
.prioridad{font-size:11px; font-weight:700; margin-right:6px}
.seleccionado{margin-top:6px; font-size:13px; padding:9px 10px; border-radius:8px; background:#e8f1f8; color:#0f3a5c; border:1px solid #c3d9ea}

/* Signos vitales */
.vs-verde{border-color:#2e7d32 !important; background:#eafbea !important}
.vs-amarillo{border-color:#e8a000 !important; background:#fff8e6 !important}
.vs-rojo{border-color:#c62828 !important; background:#fdecec !important}

/* Motivos / peligro */
.motivos,.peligro{display:grid; grid-template-columns:1fr 1fr; gap:6px; margin-top:6px}
.motivos label,.peligro label{display:flex; align-items:flex-start; gap:8px; margin:0; padding:9px 8px; border:1px solid var(--linea); border-radius:8px; background:#fbfcfd; font-weight:500; font-size:12.5px; cursor:pointer}
.motivos input,.peligro input{width:auto; margin-top:1px}
.motivos small,.peligro small{display:block; color:var(--gris); font-weight:400}
.motivos label.marcado{background:#e8f1f8; border-color:var(--azul); font-weight:700}
.peligro label.marcado{background:#fdecec; border-color:var(--rojo); font-weight:700; color:#8c1c1c}
@media(max-width:520px){.motivos,.peligro{grid-template-columns:1fr}}

/* Meds */
.meds{border:1px solid var(--linea); border-radius:8px; overflow:hidden; margin-top:6px}
.meds .med{display:flex; align-items:center; gap:8px; padding:8px 10px; border-bottom:1px solid #f0f2f4; background:#fbfcfd}
.meds .med:last-child{border-bottom:0}
.meds .med span{flex:1; font-size:12.5px}
.meds .med input{width:72px; text-align:center; padding:8px 4px}
.meds .med.con-cantidad{background:#e8f1f8}

/* Sugerencia triage */
.sugerencia{margin-top:12px; padding:12px 14px; border-radius:10px; font-size:13px; border:1px solid var(--linea); background:#f6f8fa}
.sugerencia .cab{font-weight:800; font-size:14px; margin-bottom:6px}
.sugerencia.z-verde{background:#eafbea; border-color:#bfe0c3} .sugerencia.z-verde .cab{color:#1d5622}
.sugerencia.z-amarillo{background:#fff8e6; border-color:#f0dcae} .sugerencia.z-amarillo .cab{color:#8a6100}
.sugerencia.z-rojo{background:#fdecec; border-color:#f2c4c4} .sugerencia.z-rojo .cab{color:#8c1c1c}
.sugerencia.z-traslado{background:#e7f0fb; border-color:#bcd6f0} .sugerencia.z-traslado .cab{color:#0d47a1}
.sugerencia.z-descartar{background:#eef1f3; border-color:#d4dade} .sugerencia.z-descartar .cab{color:#455563}
.sugerencia ul{margin:4px 0 0 18px; padding:0} .sugerencia li{margin:2px 0}
.sugerencia .flag{margin-top:8px; padding:8px; border-radius:8px; background:#fff3e0; color:#7a4a00; font-size:12px; font-weight:600}
.sugerencia .captopril{margin-top:8px; padding:8px; border-radius:8px; background:#f3eefb; color:#3d1f6e; font-size:12px; font-weight:600}
.sugerencia .pediatria{margin-top:8px; padding:8px; border-radius:8px; background:#eef4f9; color:#0f3a5c; font-size:12px}
.sugerencia .nota{margin-top:8px; font-size:11px; color:var(--gris)}

/* Códigos triage */
.codigos{display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-top:6px}
.codigos button{padding:14px 8px; border-radius:8px; border:2px solid transparent; font-weight:700; font-size:13px; cursor:pointer; color:#fff}
.codigos small{font-weight:600; opacity:.9}
.cod-TRASLADO{background:#1565c0} .cod-ROJO{background:var(--rojo)}
.cod-AMARILLO{background:#f5c518; color:#4a3600} .cod-VERDE{background:var(--verde)}
.cod-DESCARTADO{background:var(--gris); grid-column:1/-1}
.codigos button.sel{border-color:var(--tinta); box-shadow:0 0 0 3px rgba(15,34,47,.22)}
@keyframes parpadeo{0%,100%{opacity:1; transform:scale(1)} 50%{opacity:.45; transform:scale(.97)}}
.codigos button.parpadeo{animation:parpadeo .85s ease-in-out infinite}

/* Inventario */
.stock-tabla{border:1px solid var(--linea); border-radius:10px; overflow:hidden; margin-top:4px}
.stock-fila{display:flex; align-items:center; gap:8px; padding:10px 12px; border-bottom:1px solid #f0f2f4; background:#fff; font-size:13.5px}
.stock-fila:last-child{border-bottom:0}
.stock-fila .nom{flex:1}
.stock-fila .nom small{display:block; color:var(--gris); font-weight:400; font-size:11px}
.stock-fila .cant{font-weight:800; font-size:15px; min-width:64px; text-align:right}
.stock-fila.bajo{background:#fdecec} .stock-fila.bajo .cant{color:var(--rojo)}
.badge-bajo{display:inline-block; margin-left:6px; padding:2px 7px; border-radius:999px; background:var(--rojo); color:#fff; font-size:10px; font-weight:700; vertical-align:middle}
.resumen-inv{display:flex; gap:8px; margin-bottom:10px; flex-wrap:wrap}
.resumen-inv .chip{flex:1; min-width:110px; background:#fff; border:1px solid var(--linea); border-radius:8px; padding:10px; text-align:center}
.resumen-inv .chip b{display:block; font-size:20px}
.resumen-inv .chip span{font-size:11px; color:var(--gris)}
.resumen-inv .chip.alerta b{color:var(--rojo)}
.vacio-inv{padding:16px; text-align:center; color:var(--gris); font-size:13px}
.mov-fila{display:flex; gap:8px; padding:9px 10px; border-bottom:1px solid #f0f2f4; font-size:12.5px; background:#fff}
.mov-fila:last-child{border-bottom:0}
.mov-fila .tipo{font-weight:800; min-width:56px}
.mov-fila .tipo.ENTRADA{color:var(--verde)} .mov-fila .tipo.SALIDA{color:var(--rojo)}
.mov-fila .detalle{flex:1; color:var(--gris)}
.mov-fila .detalle b{color:var(--tinta)}

/* Dashboard */
.dash{background:#0d1922; min-height:calc(100vh - 120px); margin:0; padding:16px 14px 40px}
.dash-top{display:flex; justify-content:space-between; align-items:center; gap:10px; flex-wrap:wrap}
.dash .estado{font-size:11px; color:#8aa0b3}
.dash .btn-refrescar{background:#1c2f3d; color:#e8eef3; border:1px solid #22384a}
.dash-h{font-size:13px; text-transform:uppercase; letter-spacing:.8px; color:#8aa0b3; margin:20px 0 10px}
.alertas{display:flex; flex-direction:column; gap:6px}
.alerta{background:#3a1f22; border:1px solid #6e3238; color:#ffcdd2; padding:10px 12px; border-radius:8px; font-size:13px; font-weight:600}
.sin-alertas{background:#16301f; border:1px solid #2c5a3c; color:#a5d6a7; padding:10px 12px; border-radius:8px; font-size:13px}
.kpis{display:grid; grid-template-columns:repeat(auto-fill,minmax(120px,1fr)); gap:8px}
.kpi{background:#14232f; border:1px solid #22384a; border-radius:10px; padding:12px 10px; text-align:center}
.kpi b{display:block; font-size:26px; font-weight:800; color:#e8eef3}
.kpi span{font-size:11px; color:#8aa0b3}
.kpi.rojo b{color:#ef5350} .kpi.amarillo b{color:#ffd21f} .kpi.verde b{color:#66bb6a} .kpi.azul b{color:#4aa3df} .kpi.morado b{color:#29b6f6}
.kpi.alarma{border-color:#ef5350; background:#2a1a1e}
.tiempos{display:grid; grid-template-columns:repeat(auto-fill,minmax(180px,1fr)); gap:8px}
.tiempo{background:#14232f; border:1px solid #22384a; border-radius:10px; padding:14px; text-align:center}
.tiempo b{display:block; font-size:24px; color:#e8eef3}
.tiempo small{font-size:11px; color:#8aa0b3}
.tiempo.ok b{color:#66bb6a} .tiempo.lento b{color:#ef5350}
.grid2{display:grid; grid-template-columns:1fr 1fr; gap:14px; margin-top:14px}
@media(max-width:760px){.grid2{grid-template-columns:1fr}}
.caja{background:#14232f; border:1px solid #22384a; border-radius:10px; padding:14px}
.caja h3{font-size:13px; margin-bottom:10px; color:#e8eef3}
.barra{margin-bottom:8px}
.barra .filaB{display:flex; justify-content:space-between; font-size:12px; margin-bottom:3px; color:#cdd8e1}
.barra .filaB span:last-child{font-weight:700}
.pista{height:9px; background:#0d1922; border-radius:5px; overflow:hidden}
.relleno{height:100%; border-radius:5px; background:#4aa3df}
.vacio{font-size:12px; color:#8aa0b3}

/* Pie */
.pie{text-align:center; font-size:11px; color:var(--gris); padding:16px}
/* ===== V2: añadidos y overrides ===== */
.btn:disabled{opacity:.6; cursor:progress}
.btn-mini:disabled{opacity:.6}
.topbar{padding-top:calc(10px + env(safe-area-inset-top))}
.contenido{padding-bottom:calc(30px + env(safe-area-inset-bottom))}
.modtabs button{padding:14px 16px}
.subtabs button{padding:10px 13px}
.check input{width:22px; height:22px; flex:0 0 auto}
.codigos button{padding:16px 8px}
.aviso.warn{display:block; background:#fff7e6; color:#8a6100; border:1px solid #f0dcae}
@media(max-width:380px){.fila{grid-template-columns:1fr}}
.check.gris{background:#eef1f3; border:1px solid #d4dade}

/* Logo */
.login-logo{display:block; width:158px; max-width:60%; height:auto; margin:0 auto 12px}
.brand-logo{height:36px; width:auto; display:block}

/* Documento con prefijo */
.docgrupo{display:flex}
.docgrupo .pref{flex:0 0 auto; display:flex; align-items:center; padding:0 12px; background:#e8edf1; border:1px solid var(--linea); border-right:0; border-radius:8px 0 0 8px; font-weight:800; color:var(--gris); font-size:15px}
.docgrupo input{border-radius:0 8px 8px 0}

/* Selector de ítems (medicamentos/insumos) */
.selitems .seli-add{display:flex; gap:6px}
.selitems .seli-sel{flex:1; min-width:0}
.selitems .seli-cant{width:66px; text-align:center; flex:0 0 auto}
.selitems .seli-btn{flex:0 0 auto; width:auto; margin:0; padding:0 15px; background:var(--azul); color:#fff; border:0; border-radius:8px; font-weight:700; font-size:14px; cursor:pointer}
.seli-lista{display:flex; flex-wrap:wrap; gap:6px; margin-top:8px}
.chip{display:flex; align-items:center; gap:8px; background:#e8f1f8; border:1px solid #c3d9ea; border-radius:999px; padding:6px 6px 6px 13px; font-size:12.5px; color:#0f3a5c; font-weight:600}
.chip button{border:0; background:#c3d9ea; color:#0f3a5c; border-radius:999px; width:24px; height:24px; cursor:pointer; font-size:12px; line-height:1; padding:0}
.seli-vacio{margin-top:8px; font-size:12px; color:var(--gris)}

/* Modal de confirmación */
.modal-fondo{position:fixed; inset:0; background:rgba(8,18,26,.55); display:flex; align-items:flex-end; justify-content:center; z-index:100}
.modal{background:#fff; width:100%; max-width:520px; border-radius:16px 16px 0 0; padding:22px 18px calc(18px + env(safe-area-inset-bottom)); box-shadow:0 -8px 30px rgba(0,0,0,.3)}
@media(min-width:560px){.modal-fondo{align-items:center} .modal{border-radius:16px}}
.modal h3{font-size:16px; margin-bottom:10px}
.modal-cuerpo{font-size:14px; color:#33454f; line-height:1.55}
.modal-cuerpo b{color:var(--tinta)}
.modal-alerta{margin-top:12px; padding:11px; border-radius:8px; background:#fff3e0; color:#7a4a00; font-size:13px; font-weight:600; line-height:1.5}
.modal-acciones{display:flex; gap:8px; margin-top:20px}
.modal-acciones button{flex:1; padding:15px; border-radius:10px; font-size:15px; font-weight:700; cursor:pointer; border:0}
.btn-sec{background:#e8edf1; color:#33454f}
.btn-ok{background:var(--azul); color:#fff}

/* Listado de pacientes activos (tocable, FIFO) */
.lista-activos{margin-top:8px; border:1px solid var(--linea); border-radius:10px; max-height:300px; overflow-y:auto; -webkit-overflow-scrolling:touch; background:#fff}
.la-row{display:flex; align-items:center; gap:9px; padding:12px 10px; border-bottom:1px solid #f0f2f4; cursor:pointer; font-size:13.5px}
.la-row:last-child{border-bottom:0}
.la-row:active,.la-row:hover{background:#eef4f9}
.la-row.sel{background:#e8f1f8; box-shadow:inset 4px 0 0 var(--azul)}
.la-pos{flex:0 0 auto; width:24px; height:24px; border-radius:50%; background:#eef1f4; color:var(--gris); font-size:11px; font-weight:800; display:flex; align-items:center; justify-content:center; font-variant-numeric:tabular-nums}
.la-ic{flex:0 0 auto; font-size:15px}
.la-main{flex:1; min-width:0}
.la-main small{display:block; color:var(--gris); font-size:11px}
.la-vacio{padding:16px; text-align:center; color:var(--gris); font-size:12.5px}

/* Estética de secciones (Ingreso) */
.sec-tit{font-size:11px; text-transform:uppercase; letter-spacing:.7px; color:var(--azul); font-weight:800; margin:20px 0 6px; padding-top:14px; border-top:1px solid var(--linea); display:flex; align-items:center; gap:7px}
.sec-tit:first-child{border-top:0; padding-top:0; margin-top:4px}
.check{border-radius:10px; transition:background .15s, box-shadow .15s; -webkit-user-select:none; user-select:none}
.check b{font-weight:800}
.check input{accent-color:var(--azul)}
.check.rosa input{accent-color:var(--rojo)}
.check.amarilla input{accent-color:var(--amarillo)}
.tarjeta.ingreso{padding:18px 16px}

/* Tablero de pacientes */
.pc-card{border:1px solid var(--linea); border-radius:10px; padding:10px 11px; margin-bottom:8px; background:#fff}
.pc-top{display:flex; justify-content:space-between; gap:8px; align-items:baseline}
.pc-nom{font-weight:700; font-size:14px}
.pc-hora{font-size:11px; color:var(--gris); flex:0 0 auto}
.pc-sit{font-size:12px; color:#5a4a1a; background:#fff8e6; border-radius:8px; padding:6px 8px; margin-top:6px}
.pc-det{margin-top:6px}
.pc-det summary{cursor:pointer; font-size:12.5px; color:var(--azul); font-weight:700; padding:4px 0}
.pc-det .btn{margin-top:8px}
.vs-alert{margin-top:8px; font-size:12.5px; background:#fff5f5; border:1px solid #f3c8c8; color:#8a1f1f; border-radius:8px; padding:7px 9px}

/* Pipeline gerencial (tablero) */
.pipeline{display:flex; align-items:stretch; gap:2px; overflow-x:auto; -webkit-overflow-scrolling:touch; padding:4px 0 8px}
.pipe-et{position:relative; flex:0 0 auto; min-width:74px; border:1px solid #24435c; background:#152b3d; color:#cfe3f2; border-radius:12px; padding:9px 8px 7px; text-align:center; cursor:pointer; display:flex; flex-direction:column; gap:1px; align-items:center}
.pipe-et .pipe-n{font-size:22px; font-weight:800; color:#fff; line-height:1}
.pipe-et .pipe-ic{font-size:13px}
.pipe-et .pipe-l{font-size:10px; color:#8fa9bd; text-transform:uppercase; letter-spacing:.4px}
.pipe-et.alerta{border-color:#c62828; background:#3a1620}
.pipe-et.alerta .pipe-n{color:#ff8a80}
.pipe-et.sel{outline:2px solid #4aa3df; background:#1b3d59}
.pipe-dot{position:absolute; top:6px; right:6px; width:8px; height:8px; border-radius:50%; background:#ff5252; animation:parp 1.2s infinite}
@keyframes parp{50%{opacity:.25}}
.pipe-fl{align-self:center; color:#42607a; font-size:14px; flex:0 0 auto}
.pipe-zoom{margin-top:8px}
.zoom-fila{display:flex; gap:9px; align-items:center; padding:8px 4px; border-bottom:1px solid #223c52; font-size:13px; color:#dbe7f1}
.zoom-fila:last-child{border-bottom:0}
.zoom-main small{display:block; color:#8fa9bd; font-size:11px}
.kpis-macro .kpi b{font-size:26px}

/* ---- Pantalla grande (TV / monitor de puesto de mando) ---- */
@media (min-width:1100px){
  .contenido{max-width:1500px}
  .dash .kpis-macro{grid-template-columns:repeat(5,1fr)}
  .kpis-macro .kpi b{font-size:44px}
  .kpis-macro .kpi span{font-size:13px}
  .pipe-et{min-width:120px; padding:14px 12px 10px}
  .pipe-et .pipe-n{font-size:40px}
  .pipe-et .pipe-l{font-size:12px}
  .pipe-fl{font-size:20px}
  .dash-h{font-size:14px}
  .grid2{grid-template-columns:repeat(2,1fr)}
  .tiempo b{font-size:26px}
  .kpi b{font-size:30px}
}
/* Modo TV (pantalla completa desde el tablero) */
.dash.tv .dash-top .btn-refrescar{display:none}
</style>

/* ------------------------ HELPERS ------------------------- */
const pad=(n,l=2)=>String(n).padStart(l,"0");
function fechaHoy(d=new Date()){return pad(d.getDate())+"/"+pad(d.getMonth()+1)+"/"+d.getFullYear();}
function horaAhora(d=new Date()){return pad(d.getHours())+":"+pad(d.getMinutes());}
function ahoraStr(d=new Date()){return fechaHoy(d)+" "+horaAhora(d)+":"+pad(d.getSeconds());}
function isoHoy(){const d=new Date(); return d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate());}
const RE_LETRAS=/[^A-Za-zÁÉÍÓÚÜÑáéíóúüñ'’\- ]/g;
function limpiarCedula(c){return String(c||"").replace(/[^0-9A-Za-z]/g,"").toUpperCase();}
function normalizar(s){return String(s||"").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");}
function calcularEdad(iso){ if(!iso) return ""; const fn=new Date(iso+"T00:00:00"); if(isNaN(fn)) return ""; const h=new Date(); let e=h.getFullYear()-fn.getFullYear(); const m=h.getMonth()-fn.getMonth(); if(m<0||(m===0&&h.getDate()<fn.getDate()))e--; return e; }
function pacientePorId(db,id){ for(let i=db.pacientes.length-1;i>=0;i--){const p=db.pacientes[i]; if(p.id===id&&!ESTADOS_FINALES.includes(p.estado)) return p;} return null; }
function actualizarEstado(db,id,estado){ const p=pacientePorId(db,id); if(!p) throw new Error("No se encontró un paciente activo con el ID "+id); p.estado=estado; p.actualizado=ahoraStr(); }
function cedulaOperativa(p){return p.menor?"REP:"+p.repCedula:p.cedula;}
function nombreCompleto(p){return (p.nombre+" "+p.apellido).trim();}
function contarNN(db){ return db.pacientes.filter(p=>String(p.cedula||"").indexOf("NN-")===0).length; }
function esc(s){return String(s==null?"":s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));}
const $=(s,r=document)=>r.querySelector(s);

/* ==================== LÓGICA DE NEGOCIO ==================== */
function registrarPaciente(db,d){
  const esMenor=d.menor===true, noId=d.noIdentificado===true, sinCed=d.sinCedula===true, sinRep=d.sinRepresentante===true;
  let nombre=(d.nombre||"").trim().toUpperCase(), apellido=(d.apellido||"").trim().toUpperCase();
  const sexo=(d.sexo||""), tipoDoc=(d.tipoDocumento||""), descripcion=(d.descripcion||"").trim();
  let cedula="", repCedula="";
  if(!noId && !sexo) throw new Error("Selecciona el sexo (femenino o masculino).");
  if(sexo==="MASCULINO" && d.embarazada===true) throw new Error("Inconsistencia: un paciente masculino no puede estar embarazada.");
  if(noId){
    const tag="NN-"+pad(contarNN(db)+1,3);
    if(!descripcion) throw new Error("Como el paciente es NO IDENTIFICADO, escribe una seña o descripción que permita reconocerlo.");
    nombre="NO IDENTIFICADO"; apellido=tag; cedula=tag;
  } else if(esMenor){
    if(!nombre||!apellido) throw new Error("Nombre y apellido del menor son obligatorios.");
    if(sinRep){
      if(!descripcion) throw new Error("El representante también es menor de edad: describe la situación y quién acompaña al menor.");
      repCedula="SIN REPRESENTANTE";
    } else {
      repCedula=(d.repCedula||"").trim().toUpperCase();
      if(!d.repNombre||!d.repApellido) throw new Error("Nombre y apellido del representante son obligatorios.");
      if(!repCedula){ if(d.repSinCedula) repCedula="SIN DOCUMENTO"; else throw new Error("El documento del representante es obligatorio (o marca que no lo proporciona)."); }
      if(d.repFechaNac){ const re=calcularEdad(d.repFechaNac); if(re!=="" && re<18) throw new Error("El representante debe ser mayor de edad ("+re+" años). Marca la opción de que no hay representante válido."); }
    }
  } else {
    if(!nombre||!apellido) throw new Error("Nombre y apellido son obligatorios.");
    cedula=(d.cedula||"").trim().toUpperCase();
    if(!cedula){ if(sinCed) cedula="SIN DOCUMENTO"; else throw new Error("El documento de identidad es obligatorio (o marca que no lo proporciona)."); }
  }
  const docReal = cedula && cedula!=="SIN DOCUMENTO" && cedula.indexOf("NN-")!==0;
  const repReal = repCedula && repCedula!=="SIN DOCUMENTO" && repCedula!=="SIN REPRESENTANTE";
  for(const p of db.pacientes){
    if(ESTADOS_FINALES.includes(p.estado)) continue;
    if(!esMenor && !noId && docReal && limpiarCedula(p.cedula)===limpiarCedula(cedula)) throw new Error("El documento "+cedula+" ya tiene un ingreso activo en la jornada.");
    if(esMenor && p.menor && repReal && limpiarCedula(p.repCedula)===limpiarCedula(repCedula) && String(p.nombre)===nombre && String(p.apellido)===apellido) throw new Error("Este menor ya tiene un ingreso activo con ese representante.");
  }
  const now=new Date();
  const id="P-"+now.getFullYear()+pad(now.getMonth()+1)+pad(now.getDate())+"-"+pad(db.pacientes.length+1,4);
  db.pacientes.push({ id, fecha:fechaHoy(now), hora:horaAhora(now), tsMs:now.getTime(),
    nombre, apellido, sexo, fechaNacimiento:d.fechaNacimiento||"", edad:calcularEdad(d.fechaNacimiento), tipoDocumento:tipoDoc,
    cedula:esMenor?"":cedula, menor:esMenor, repNombre:(esMenor&&!sinRep)?(d.repNombre||"").trim().toUpperCase():"", repApellido:(esMenor&&!sinRep)?(d.repApellido||"").trim().toUpperCase():"",
    repFechaNac:(esMenor&&!sinRep)?(d.repFechaNac||""):"", repCedula:esMenor?repCedula:"", embarazada:d.embarazada===true, noIdentificado:noId, descripcion, estado:ESTADO.INGRESADO, actualizado:ahoraStr(now) });
  const etq = noId ? ("NO IDENTIFICADO — "+descripcion) : (nombre+" "+apellido+(esMenor?" (menor)":""));
  return {ok:true, mensaje:"Paciente "+etq+" ingresado ("+id+"). Pasa a TRIAGE."};
}
function buscarRepresentante(db,cedulaRep){ const ced=limpiarCedula(cedulaRep); if(!ced) return null; for(let i=db.pacientes.length-1;i>=0;i--){const p=db.pacientes[i]; if(p.menor&&limpiarCedula(p.repCedula)===ced) return {repNombre:p.repNombre,repApellido:p.repApellido,repFechaNac:p.repFechaNac||"",repCedula:p.repCedula};} return null; }
function getPacientesActivos(db,estados,orden){
  const out=[];
  for(const p of db.pacientes){
    if(!estados.includes(p.estado)) continue;
    const nombre=nombreCompleto(p); const edad=p.edad!==""?p.edad+" años":"";
    let etiqueta,busqueda;
    if(p.noIdentificado){ etiqueta="NO IDENTIFICADO — "+(p.descripcion||"")+(edad?" ("+edad+")":""); busqueda=["no identificado",p.descripcion,p.cedula].join(" "); }
    else if(p.menor){ const rep=p.repCedula==="SIN REPRESENTANTE"?"sin representante":("Rep: "+(p.repNombre+" "+p.repApellido).trim()+" · "+p.repCedula); etiqueta=nombre+(edad?" ("+edad+", menor)":" (menor)")+" — "+rep; busqueda=[nombre,p.repNombre,p.repApellido,p.repCedula,p.descripcion].join(" "); }
    else { etiqueta=(p.cedula?p.cedula+" — ":"")+nombre+(edad?" ("+edad+")":""); busqueda=[p.cedula,nombre].join(" "); }
    out.push({id:p.id,etiqueta,busqueda,estado:p.estado,edad:p.edad!==""?Number(p.edad):null,esMenor:p.menor,embarazada:p.embarazada,sexo:p.sexo||"",tsMs:p.tsMs||0,hora:p.hora||""});
  }
  const prio=[ESTADO.ESPERA_ROJO,ESTADO.ESPERA_AMARILLO,ESTADO.ESPERA_VERDE];
  if(orden==="fifo"){ out.sort((a,b)=>a.tsMs-b.tsMs); }
  else { out.sort((a,b)=>{const ia=prio.indexOf(a.estado),ib=prio.indexOf(b.estado); const da=(ia===-1?99:ia)-(ib===-1?99:ib); return da!==0?da:(a.tsMs-b.tsMs);}); }
  return out;
}
function getUltimoTriage(db,id){ for(let i=db.triage.length-1;i>=0;i--){ if(db.triage[i].id===id) return {motivos:db.triage[i].motivos||"",codigo:db.triage[i].codigo||"",signos:db.triage[i].signos||""}; } return null; }
function registrarTriage(db,d){
  const p=pacientePorId(db,d.id); if(!p) throw new Error("Paciente no encontrado o ya cerrado. Refresca la lista.");
  if(!d.motivos) throw new Error("Selecciona al menos un motivo/síntoma.");
  const now=new Date();
  db.triage.push({fechaHora:ahoraStr(now),tsMs:now.getTime(),id:d.id,cedula:cedulaOperativa(p),paciente:nombreCompleto(p),codigo:d.codigo,ta:d.ta||"",fc:d.fc||"",fr:d.fr||"",temp:d.temp||"",sat:d.sat||"",motivos:d.motivos,observaciones:d.observaciones||"",responsable:d.responsable||"",signos:d.signos||"",colorSugerido:d.colorSugerido||""});
  const nom=nombreCompleto(p); let mensaje;
  switch(d.codigo){
    case "ROJO": actualizarEstado(db,d.id,ESTADO.ESPERA_ROJO); mensaje=nom+" → CONSULTA URGENTE (rojo)."; break;
    case "AMARILLO": actualizarEstado(db,d.id,ESTADO.ESPERA_AMARILLO); mensaje=nom+" → consulta prioritaria (amarillo)."; break;
    case "VERDE": actualizarEstado(db,d.id,ESTADO.ESPERA_VERDE); mensaje=nom+" → consulta ambulatoria (verde)."; break;
    case "TRASLADO": actualizarEstado(db,d.id,ESTADO.TRASLADO_PENDIENTE); mensaje=nom+" → TRASLADO DE EMERGENCIA. Completar en Atención › Traslados."; break;
    case "DESCARTADO": actualizarEstado(db,d.id,ESTADO.DESCARTADO); mensaje=nom+" descartado (fuera del alcance)."; break;
    default: throw new Error("Código de triage no válido.");
  }
  return {ok:true,mensaje};
}
function ajustarStock(db,item,delta,tipo,origen,referencia,responsable){
  item=String(item||"").trim(); if(!item||!delta) return null;
  let row=db.inventario.find(r=>r.item.trim().toLowerCase()===item.toLowerCase());
  if(!row){ row={item,categoria:"Medicamento/Insumo",unidad:"",stock:0,minimo:0,actualizado:ahoraStr(),area:"Ambos"}; db.inventario.push(row); }
  row.stock=(Number(row.stock)||0)+delta; row.actualizado=ahoraStr();
  db.movimientos.push({fechaHora:ahoraStr(),tsMs:Date.now(),item,tipo,cantidad:Math.abs(delta),saldo:row.stock,origen:origen||"",referencia:referencia||"",responsable:responsable||""});
  return row.stock;
}
function descontarInsumos(db,cadena,origen,referencia,responsable){ if(!cadena) return; String(cadena).split(";").forEach(parte=>{const mm=parte.trim().match(/^(.*)\sx\s(\d+)$/); if(mm){const nombre=mm[1].trim(),cant=+mm[2]; if(nombre&&cant>0) ajustarStock(db,nombre,-cant,"SALIDA",origen,referencia,responsable);}}); }
function actualizarMetaItem(db,item,meta){ const row=db.inventario.find(r=>r.item.trim().toLowerCase()===String(item).trim().toLowerCase()); if(!row) return; if(meta.categoria)row.categoria=meta.categoria; if(meta.unidad)row.unidad=meta.unidad; if(meta.minimo!==undefined&&meta.minimo!==""&&!isNaN(Number(meta.minimo)))row.minimo=Number(meta.minimo); if(meta.area)row.area=meta.area; }
function registrarConsulta(db,d){
  const p=pacientePorId(db,d.id); if(!p) throw new Error("Paciente no encontrado o ya cerrado. Refresca la lista.");

/* ================== MOTOR DE TRIAGE (portado) ================== */
const MOTIVOS_ORDEN=["TRAUMA","DOLFIE","RESP","ASMA","ALERG","GASTRO","PARASIT","DERMA","HTA","DM","OCULAR","MHPSS","REF"];
const MATRIZ={
  S1:["RT","R","RT","RT","R","R","R","R","RT","R","R","R","T"],
  S2:["T","RT","RT","T","R","R","R","R","T","RT","R","RT","T"],
  S3:["T","RT","RT","R","RT","RT","R","RT","T","RT","R","R","T"],
  S4:["RT","RT","RT","R","R","T","R","R","T","R","T","R","T"],
  S5:["T","RT","R","R","R","R","R","R","T","RT","R","RT","T"],
  S6:["RT","R","RT","R","R","R","R","R","T","RT","R","R","T"],
  S7:["R","R","R","R","R","RT","RT","R","R","RT","R","R","T"],
  S8:["RT","RT","RT","R","R","RT","RT","RT","R","RT","R","R","T"],
  S9:["R","R","RT","RT","RT","R","R","RT","R","R","R","R","T"],
  S10:["T","T","T","T","T","T","T","T","T","T","T","T","T"],
  S11:["T","T","T","T","T","T","T","T","T","T","T","T","T"]
};
const BASE={TRAUMA:"A",DOLFIE:"V",RESP:"V",ASMA:"A",ALERG:"V",GASTRO:"V",PARASIT:"V",DERMA:"V",HTA:"V",DM:"A",OCULAR:"V",MHPSS:"V",REF:"D"};
const RANK={D:0,V:1,A:2,R:3,T:4};
const maxCod=(a,b)=>RANK[a]>=RANK[b]?a:b;
const escalarUno=c=>c==="V"?"A":c==="A"?"R":c==="D"?"A":c;
const celda=(sg,m)=>{const i=MOTIVOS_ORDEN.indexOf(m); return i===-1?"R":MATRIZ[sg][i];};
function pedRef(edad){ if(edad<1)return{fr:[30,53],frCrit:60,frBaja:20,fc:[100,160],fcCrit:180,fcBaja:80}; if(edad<3)return{fr:[22,37],frCrit:45,frBaja:18,fc:[90,150],fcCrit:170,fcBaja:70}; if(edad<6)return{fr:[20,28],frCrit:40,frBaja:16,fc:[80,140],fcCrit:160,fcBaja:65}; return{fr:[18,25],frCrit:30,frBaja:12,fc:[70,120],fcCrit:145,fcBaja:55}; }
const zPedVar=(v,band,crit,baja)=>v==null?null:(v>=crit||v<=baja?"rojo":(v<band[0]||v>band[1]?"amarillo":"verde"));
const zFRad=v=>v==null?null:(v<=8||v>=25?"rojo":(v<=11||v>=21?"amarillo":"verde"));
const zFCad=v=>v==null?null:(v<=40||v>=131?"rojo":(v<=50||v>=111?"amarillo":"verde"));
const zSat=v=>v==null?null:(v<=91?"rojo":(v<=93?"amarillo":"verde"));
const zTemp=v=>v==null?null:(v<=35.0?"rojo":(v<=36.0||v>=39.1?"amarillo":"verde"));
function zTA(sys,dia,sintomas){
  if(sys==null&&dia==null) return {z:null};
  if(sys!=null&&sys<90) return {z:"rojo",shock:true,txt:"Hipotensión (PAS <90): activa signo de shock (S3)."};
  const alta=(sys!=null&&sys>=180)||(dia!=null&&dia>=120);
  if(alta){ if(sintomas) return {z:"rojo",emergencia:true,txt:"Emergencia hipertensiva (≥180/120 con síntomas de daño de órgano)."}; return {z:"amarillo",urgencia:true,txt:"Urgencia hipertensiva (≥180/120 sin síntomas)."}; }
  const alerta=(sys!=null&&((sys>=90&&sys<=100)||(sys>=160&&sys<=179)))||(dia!=null&&dia>=100&&dia<=119);
  if(alerta) return {z:"amarillo",txt:"PA en zona de alerta."};
  return {z:"verde"};
}
const nombreVar=k=>({fr:"FR",fc:"FC",sat:"Sat O₂",temp:"Temp",taZ:"PA"}[k]);
function zonasDe(vit,sintomas,usarPed,edad){
  const z={};
  if(usarPed){const r=pedRef(edad); z.fr=zPedVar(vit.fr,r.fr,r.frCrit,r.frBaja); z.fc=zPedVar(vit.fc,r.fc,r.fcCrit,r.fcBaja); z.ref=r;}
  else {z.fr=zFRad(vit.fr); z.fc=zFCad(vit.fc);}
  z.sat=zSat(vit.sat); z.temp=zTemp(vit.temp);
  const t=zTA(vit.sys,vit.dia,sintomas); z.taZ=t.z; z.taEval=t; return z;
}
function motor(marcados,motivos,vit){
  const usarPed=vit.esMenor&&vit.edad!=null,edad=vit.edad;
  const frCrit=usarPed?pedRef(edad).frCrit:25, frBaja=usarPed?pedRef(edad).frBaja:8;
  const signos=marcados.slice();
  if((vit.sat!=null&&vit.sat<=91)||(vit.fr!=null&&(vit.fr>=frCrit||vit.fr<=frBaja))){ if(!signos.includes("S1"))signos.push("S1"); }
  if(vit.sys!=null&&vit.sys<90){ if(!signos.includes("S3"))signos.push("S3"); }
  const sintomas=["S1","S2","S4","S6","S10"].some(s=>signos.includes(s));
  const zonas=zonasDe(vit,sintomas,usarPed,edad);
  const criticos=["fr","fc","sat","temp","taZ"].filter(k=>zonas[k]==="rojo");
  const alertas=["fr","fc","sat","temp","taZ"].filter(k=>zonas[k]==="amarillo");
  let r;
  if(!motivos.length) r={codigo:null,sinMotivo:true};
  else if(zonas.taEval&&zonas.taEval.emergencia) r={codigo:"T",notas:["Emergencia hipertensiva con daño de órgano."]};
  else if(signos.includes("S10")) r={codigo:"T",notas:["Emergencia obstétrica (S10): quirófano / hemoderivados / neonatología."]};
  else if(signos.includes("S11")) r={codigo:"T",notas:["Síndrome de aplastamiento / rabdomiólisis (S11): riesgo de falla renal."]};
  else if(signos.length>=2) r={codigo:"T",notas:["≥2 signos de peligro simultáneos: inestabilidad multisistémica."]};
  else if(criticos.length>=2) r={codigo:"T",notas:["≥2 signos vitales en zona crítica: inestabilidad multisistémica."]};
  else if(signos.length===1){ const sg=signos[0],celdas=motivos.map(m=>celda(sg,m));
    if(celdas.includes("T")) r={codigo:"T",notas:["Combinación "+sg+" × motivo excede la capacidad resolutiva."]};
    else if(celdas.includes("RT")) r={codigo:"R",notas:["Signo de peligro "+sg+": manejo en sitio."],flags:["Candidato a TRASLADO: reevaluar en 15–30 min y preparar referencia si no responde."]};
    else r={codigo:"R",notas:["Signo de peligro "+sg+"."]};
  }
  else if(criticos.length===1) r={codigo:"R",notas:["Signo vital en zona crítica ("+nombreVar(criticos[0])+"): atención inmediata."]};
  else if(zonas.taEval&&zonas.taEval.urgencia) r={codigo:"R",notas:["Urgencia hipertensiva sin síntomas."],flags:["Captopril 25 mg VO (no sublingual); reevaluar PA en 30–60 min. Si <180/120 y asintomático → AMARILLO. Sin respuesta tras 2 dosis o con síntomas → TRASLADO."],captopril:true};
  else {
    let motEf=motivos.filter(m=>m!=="REF"); if(!motEf.length)motEf=motivos;
    let base="D"; motEf.forEach(m=>base=maxCod(base,BASE[m]||"V"));
    const captopril=motivos.includes("HTA")&&zonas.taZ==="amarillo";
    let codigo=base; const notas=[],flags=[];
    if(alertas.length===1){codigo=escalarUno(codigo); notas.push("1 signo vital en alerta: escala un nivel.");}
    if(alertas.length>=2){codigo=maxCod(codigo,"A"); flags.push("≥2 signos vitales en alerta: mínimo AMARILLO; reevaluar en 30 min.");}
    if(motivos.length===1&&motivos[0]==="REF"&&alertas.length===0&&criticos.length===0){codigo="D"; notas.length=0; notas.push("Referencia sin urgencia → referencia programada.");}
    r={codigo,notas,flags,captopril};
  }
  r.zonas=zonas; r.signosAuto=signos.filter(s=>!marcados.includes(s)); r.usarPed=usarPed; r.edad=edad;
  return r;
}
const COD_A_BTN={T:"TRASLADO",R:"ROJO",A:"AMARILLO",V:"VERDE",D:"DESCARTADO"};
const COD_A_TXT={T:"TRASLADO — emergencia externa",R:"ROJO — atención urgente en sitio",A:"AMARILLO — atención prioritaria",V:"VERDE — ambulatorio",D:"DESCARTAR — referencia programada"};

/* Refresco suave: trae datos del Sheet si pasaron >45 s desde el último pull.
   No bloquea la interfaz; al terminar repinta el módulo activo si no hay un

const DB = {pacientes:[],triage:[],consulta:[],estabilizacion:[],traslados:[],inventario:[],movimientos:[],consultaVet:[],usuarios:[]};

/* -- almacenamiento local (fallback / modo sin Sheet) -- */
const memoria = {};
function localGet(k){ try{ if(window.localStorage) return localStorage.getItem(k); }catch(e){} return memoria[k]!==undefined?memoria[k]:null; }
function localSet(k,v){ try{ if(window.localStorage){ localStorage.setItem(k,v); return; } }catch(e){} memoria[k]=v; }

function coerce(tabla,row){
  const o={}; ESQUEMA[tabla].forEach(c=>{o[c]=row[c]!==undefined?row[c]:"";});
  (CAMPOS_BOOL[tabla]||[]).forEach(c=>{const v=o[c]; const s=String(v).trim().toUpperCase(); o[c]=(v===true||s==="TRUE"||s==="SI"||s==="SÍ"||s==="S"||s==="X"||s==="1"||v===1);});
  (CAMPOS_NUM[tabla]||[]).forEach(c=>{ if(o[c]!==""&&o[c]!=null&&!isNaN(Number(o[c]))) o[c]=Number(o[c]); });
  return o;
}
function serializa(tabla){ return DB[tabla].map(r=>{const o={}; ESQUEMA[tabla].forEach(c=>{let v=r[c]; if(typeof v==="boolean")v=v?true:false; o[c]=v===undefined?"":v;}); return o;}); }

/* ---- Estrategia de escritura por tabla (segura para muchos usuarios) ----
   · Tablas de EVENTOS (triage, consulta, estabilización, traslados, movimientos,
     consulta vet): solo se AGREGAN filas nuevas (appendRows, dedupe por tsMs).
   · Tablas de ESTADO (pacientes, usuarios, inventario): upsert por clave —
     cada fila se actualiza o agrega sin borrar las de otros usuarios.        */
const ESTRATEGIA = {
  pacientes:{op:"upsertById", key:"id"},
  usuarios:{op:"upsertById", key:"usuario"},
  inventario:{op:"upsertById", key:"item"},
  triage:{op:"appendRows"}, consulta:{op:"appendRows"}, estabilizacion:{op:"appendRows"},
  traslados:{op:"appendRows"}, movimientos:{op:"appendRows"}, consultaVet:{op:"appendRows"}
};
/* Punteros de "ya sincronizado" para append (por tabla). */
const SYNCED = {};
function syncedGet(t){ if(SYNCED[t]!==undefined) return SYNCED[t]; const v=parseInt(localGet("hcrm:sync:"+t)||"0",10); SYNCED[t]=isNaN(v)?0:v; return SYNCED[t]; }
function syncedSet(t,n){ SYNCED[t]=n; localSet("hcrm:sync:"+t, String(n)); }

async function apiPost(payload){
  const res = await fetch(API_URL, {method:"POST", headers:{"Content-Type":"text/plain;charset=utf-8"}, body: JSON.stringify(payload)});
  const txt = await res.text();
  let j; try{ j=JSON.parse(txt); }catch(e){ throw new Error("Respuesta no válida al guardar (HTTP "+res.status+"). "+_pistaConexion(txt)); }
  if(!j.ok) throw new Error(j.error||"Error al guardar en el Sheet.");
  return j;
}
async function pushRemoto(tabla){
  const est=ESTRATEGIA[tabla]||{op:"pushTable"};
  const filas=serializa(tabla);
  if(est.op==="appendRows"){
    const desde=Math.min(syncedGet(tabla), filas.length);
    const nuevas=filas.slice(desde);
    if(!nuevas.length) return;
    await apiPost({op:"appendRows", sheet:HOJAS[tabla], rows:nuevas});
    syncedSet(tabla, filas.length);
  } else if(est.op==="upsertById"){
    await apiPost({op:"upsertById", sheet:HOJAS[tabla], key:est.key, rows:filas});
  } else {
    await apiPost({op:"pushTable", sheet:HOJAS[tabla], rows:filas});
  }
}
async function pullRemoto(){
  const res = await fetch(API_URL + (API_URL.indexOf("?")>=0?"&":"?") + "action=readAll", {method:"GET"});
  const txt = await res.text();
  let j; try{ j=JSON.parse(txt); }catch(e){ throw new Error("Respuesta no válida (HTTP "+res.status+"). "+_pistaConexion(txt)); }
  if(!j.ok) throw new Error(j.error||"Error al leer el Sheet.");
  TABLAS.forEach(t=>{ const filas=(j.data&&j.data[HOJAS[t]])||[]; DB[t]=filas.map(f=>coerce(t,f)); if((ESTRATEGIA[t]||{}).op==="appendRows") syncedSet(t, DB[t].length); localSet("hcrm:"+t, JSON.stringify(serializa(t))); });
  ULTIMO_PULL = Date.now();
}
/* Pista según el cuerpo recibido cuando NO es JSON */
function _pistaConexion(txt){
  const t=(txt||"").toLowerCase();
  if(t.indexOf("accounts.google.com")>=0 || t.indexOf("iniciar sesión")>=0 || t.indexOf("sign in")>=0)
    return "El servidor pidió inicio de sesión → en el despliegue, 'Quién tiene acceso' debe ser CUALQUIERA.";
  if(t.indexOf("<a class=\"i\"")>=0 || t.indexOf("hospital de campaña — menú")>=0 || t.indexOf("1 · ingreso")>=0)
    return "Respondió la página del menú viejo → falta re-desplegar con Versión: Nueva (para que atienda ?action).";
  if(t.indexOf("<!doctype")>=0 || t.indexOf("<html")>=0)
    return "El servidor devolvió una página HTML en vez de datos → revisa la URL /exec y el acceso 'Cualquiera'.";
  if(t.indexOf("script function not found")>=0 || t.indexOf("doget")>=0)
    return "El proyecto no tiene la función esperada → confirma que pegaste el Codigo.gs actualizado y guardaste.";
  return "Revisa que la URL termine en /exec y que el despliegue sea Aplicación web con acceso 'Cualquiera'.";
}
/* Prueba de conexión: ?action=ping (no escribe nada) */
async function pingRemoto(){
  if(!API_URL) return {ok:false, local:true};
  const url = API_URL + (API_URL.indexOf("?")>=0?"&":"?") + "action=ping";
  let res, txt;
  try{ res = await fetch(url, {method:"GET"}); }
  catch(e){ return {ok:false, error:"No se pudo contactar el servidor (posible URL mal escrita, sin internet o bloqueo CORS). "+e.message}; }
  try{ txt = await res.text(); }catch(e){ txt=""; }
  let j=null; try{ j=JSON.parse(txt); }catch(e){}
  if(j && j.ok) return {ok:true, status:res.status, info:j};
  return {ok:false, status:res.status, error:_pistaConexion(txt), muestra:(txt||"").slice(0,160)};
}
async function diagnoseRemoto(){
  if(!API_URL) return {ok:false, error:"Sin API_URL."};
  const url = API_URL + (API_URL.indexOf("?")>=0?"&":"?") + "action=diagnose";
  let res, txt;
  try{ res = await fetch(url, {method:"GET"}); }catch(e){ return {ok:false, error:e.message}; }
  try{ txt = await res.text(); }catch(e){ txt=""; }
  let j=null; try{ j=JSON.parse(txt); }catch(e){}
  if(j && j.ok) return {ok:true, info:j};
  return {ok:false, error:_pistaConexion(txt)};
}

async function cargarTodo(){

  if(!DB.usuarios || DB.usuarios.length===0){ DB.usuarios = USUARIOS_SEMILLA.map(u=>({...u})); await commit("usuarios"); }

async function commit(tabla){
  if(MODO==="sheet"){
    try{ await pushRemoto(tabla); }
    catch(e){ localSet("hcrm:"+tabla, JSON.stringify(serializa(tabla))); throw e; }
  } else {
    localSet("hcrm:"+tabla, JSON.stringify(serializa(tabla)));
  }
}
/* commit de varias tablas; devuelve error combinado si alguna falla */
async function commitAll(tablas){
  const errores=[];
  for(const t of tablas){ try{ await commit(t); }catch(e){ errores.push(e.message); } }
  if(errores.length) throw new Error("Guardado local OK, pero falló la sincronización con el Sheet: "+errores.join(" "));
}

/* --- Modal de confirmación (Promise<bool>) --- */
function confirmar(titulo, detalleHTML, opciones){
  opciones=opciones||{};
  return new Promise(res=>{
    const f=document.createElement("div"); f.className="modal-fondo";
    f.innerHTML='<div class="modal"><h3>'+esc(titulo)+'</h3><div class="modal-cuerpo">'+(detalleHTML||"")+'</div>'+
      '<div class="modal-acciones"><button class="btn-sec" data-a="0">'+esc(opciones.cancelar||"Cancelar")+'</button><button class="btn-ok" data-a="1">'+esc(opciones.ok||"Confirmar")+'</button></div></div>';
    document.body.appendChild(f);
    function cerrar(v){ if(f.parentNode) document.body.removeChild(f); res(v); }
    f.addEventListener("click",e=>{ if(e.target===f){ cerrar(false); return; } const a=e.target.getAttribute("data-a"); if(a!==null) cerrar(a==="1"); });
  });
}

async function registrar(btn, confInfo, tablas, fn, contexto){

  }catch(err){
    ocupado=false; if(btn){ btn.disabled=false; btn.textContent=t0; }
    if(!mutado) mostrarAviso("error", err.message); else renderModulo((contexto&&contexto.volverA)||moduloActual,{tipo:"error",msg:err.message},contexto);
  }
}

const selectores={};
function selectorItemsHTML(id, catalogo, placeholder){

    '<div class="seli-lista"></div></div>';

function montarSelectorItems(id){
  selectores[id]=[];
  const cont=$("#"+id), sel=cont.querySelector(".seli-sel"), otro=cont.querySelector(".seli-otro"), cant=cont.querySelector(".seli-cant"), btn=cont.querySelector(".seli-btn"), lista=cont.querySelector(".seli-lista");
  function pintar(){
    if(!selectores[id].length){ lista.innerHTML='<div class="seli-vacio">Ninguno agregado todavía.</div>'; return; }
    lista.innerHTML=selectores[id].map((it,i)=>'<div class="chip"><span>'+esc(it.nombre)+' × '+it.cant+'</span><button type="button" data-i="'+i+'">✕</button></div>').join("");
    $$("button[data-i]",lista).forEach(b=>b.addEventListener("click",()=>{ selectores[id].splice(+b.getAttribute("data-i"),1); pintar(); }));
  }
  sel.addEventListener("change",()=>{ const o=sel.value==="__OTRO__"; otro.style.display=o?"block":"none"; if(o)otro.focus(); });
  function agregar(){
    let n=""; if(sel.value==="__OTRO__") n=(otro.value||"").trim(); else n=sel.value;
    const c=parseInt(cant.value,10);
    if(!n){ (sel.value==="__OTRO__"?otro:sel).focus(); return; }
    if(!c||c<1){ cant.focus(); return; }
    const ex=selectores[id].find(x=>x.nombre.toLowerCase()===n.toLowerCase()); if(ex)ex.cant+=c; else selectores[id].push({nombre:n,cant:c});
    sel.value=""; otro.value=""; otro.style.display="none"; cant.value="1"; pintar();
  }
  btn.addEventListener("click",agregar);
  otro.addEventListener("keydown",e=>{ if(e.key==="Enter"){ e.preventDefault(); agregar(); } });
  pintar();
}
function serializeItems(id){ return (selectores[id]||[]).map(it=>it.nombre+" x "+it.cant).join("; "); }

/* --- Documento con prefijo automático (V-/E-/Pasaporte) --- */
function docGrupoHTML(idTipo, idDoc){
  return '<label>Tipo de documento</label><select id="'+idTipo+'"><option value="V">V — Cédula venezolana</option><option value="E">E — Cédula extranjera</option><option value="P">Pasaporte</option></select>'+
    '<label>Número de documento *</label><div class="docgrupo"><span class="pref" id="pref_'+idDoc+'">V-</span><input id="'+idDoc+'" inputmode="numeric" autocomplete="off" maxlength="8"></div>'+
    '<div class="mut" style="font-size:11px; margin-top:4px" id="hint_'+idDoc+'">Solo números; máximo 8 dígitos. Se agrega "V-" automáticamente.</div>';
}
function montarDocGrupo(idTipo, idDoc){
  const sel=$("#"+idTipo), inp=$("#"+idDoc), pref=$("#pref_"+idDoc), hint=$("#hint_"+idDoc);
  function aplicar(){
    const t=sel.value;
    if(t==="P"){ pref.textContent="PAS"; inp.setAttribute("maxlength","12"); inp.setAttribute("inputmode","text"); inp.value=inp.value.toUpperCase().replace(/[^0-9A-Z]/g,"").slice(0,12); hint.textContent="Letras y números; máximo 12 caracteres."; }
    else { pref.textContent=(t==="E"?"E-":"V-"); inp.setAttribute("maxlength","8"); inp.setAttribute("inputmode","numeric"); inp.value=inp.value.replace(/\D/g,"").slice(0,8); hint.textContent='Solo números; máximo 8 dígitos. Se agrega "'+(t==="E"?"E-":"V-")+'" automáticamente.'; }
  }
  sel.addEventListener("change",aplicar); inp.addEventListener("input",aplicar); aplicar();
}
function docFinal(idTipo, idDoc){ const t=val("#"+idTipo), raw=(val("#"+idDoc)||"").trim().toUpperCase(); if(!raw) return ""; if(t==="P") return "PAS-"+raw; return (t==="E"?"E-":"V-")+raw; }
function soloLetrasLive(e){ const p=e.target.selectionStart; e.target.value=e.target.value.replace(RE_LETRAS,"").toUpperCase(); try{ e.target.setSelectionRange(p,p);}catch(x){} }

function renderIngreso(c){
  c.innerHTML =

      '<div class="sec-tit">🩺 Condición del paciente</div>'+
      '<label class="check amarilla"><input type="checkbox" id="i_menor"> 🧒 El paciente es <b>menor de edad</b> (menos de 18 años)</label>'+
      '<label class="check rosa" id="embLbl"><input type="checkbox" id="i_emb"> 🤰 Paciente <b>embarazada</b><span id="embNota" class="mut" style="font-size:11px"></span></label>'+
      '<div id="repWrap"></div>'+
    '</div>'+
    '<div id="descWrap"></div>'+
    '<button class="btn" type="submit">Registrar ingreso</button>'+
    avisoHTML()+
  '</form></div>';

  $("#i_nombre").addEventListener("input",soloLetrasLive);
  $("#i_apellido").addEventListener("input",soloLetrasLive);
  montarDocGrupo("i_tipoDoc","i_cedula");
  let descMode=null, repMenorFlag=false;

  function pintarDesc(modo){
    if(modo===descMode) return; descMode=modo;
    const w=$("#descWrap");
    if(modo==="noid") w.innerHTML='<label>Seña o descripción para identificar al paciente *</label><div class="mut" style="font-size:11px; margin-bottom:4px">Escribe rasgos visibles que ayuden a reconocerlo: sexo y edad aparentes, vestimenta, señas particulares, dónde y cómo se encontró, etc.</div><textarea id="i_desc" placeholder="Ej.: Hombre ~60 años, camisa azul, cicatriz en frente, hallado inconsciente en refugio B"></textarea>';
    else if(modo==="repminor") w.innerHTML='<div class="modal-alerta" style="margin-top:0">⚠️ El representante también es menor de edad: NO hay representante válido.</div><label>Describe la situación y quién acompaña al menor *</label><textarea id="i_desc" placeholder="Ej.: Acompañado por su hermana de 15 años; sin adulto responsable presente"></textarea>';
    else w.innerHTML="";
  }
  function evaluarRep(){
    const f=$("#r_fn"); let e=""; if(f&&f.value) e=calcularEdad(f.value);
    const msg=$("#r_msg");
    if(e!=="" && e<18){ repMenorFlag=true; if(msg){ msg.style.color="var(--rojo)"; msg.textContent="El representante tiene "+e+" años: es menor de edad."; } pintarDesc("repminor"); }
    else { repMenorFlag=false; if(chk("#i_noid")) pintarDesc("noid"); else pintarDesc(""); }
  }
  function pintar(){
    const menor=chk("#i_menor"), noId=chk("#i_noid"), sinCed=chk("#i_sincedula");
    $("#idWrap").style.display = noId ? "none" : "block";
    if(noId){ pintarDesc("noid"); return; }
    $("#docWrap").style.display = (menor||sinCed) ? "none" : "block";
    $("#sinCedWrap").style.display = menor ? "none" : "flex";
    $("#repWrap").innerHTML = menor ?
      '<div class="repbox"><h2 style="font-size:14px">Datos del representante <small class="mut">(debe ser mayor de edad)</small></h2>'+
      '<label>Fecha de nacimiento del representante</label><input type="date" id="r_fn" max="'+isoHoy()+'">'+
      '<div id="rDocWrap"><label>Documento del representante *</label><div style="display:flex; gap:8px; align-items:flex-end"><div style="flex:1">'+docGrupoHTML("r_tipoDoc","r_ced")+'</div><button type="button" class="btn-refrescar" id="r_buscar" title="Buscar representante registrado">🔍</button></div></div>'+
      '<label class="check gris"><input type="checkbox" id="r_sincedula"> El representante <b>no proporciona</b> documento</label>'+
      '<div id="r_msg" style="font-size:12px; margin-top:4px"></div>'+
      '<div class="fila"><div><label>Nombre del representante *</label><input id="r_nom" style="text-transform:uppercase"></div><div><label>Apellido del representante *</label><input id="r_ape" style="text-transform:uppercase"></div></div></div>' : "";
    if(menor){
      montarDocGrupo("r_tipoDoc","r_ced");
      $("#r_nom").addEventListener("input",soloLetrasLive);
      $("#r_ape").addEventListener("input",soloLetrasLive);
      $("#r_fn").addEventListener("change",evaluarRep);
      $("#r_sincedula").addEventListener("change",()=>{ $("#rDocWrap").style.display=chk("#r_sincedula")?"none":"block"; });
      $("#r_buscar").addEventListener("click",buscarRep);
      evaluarRep();
    } else { repMenorFlag=false; pintarDesc(""); }
  }
  function sexoCambia(){
    const m=val("#i_sexo")==="MASCULINO", emb=$("#i_emb"), nota=$("#embNota");
    if(m){ emb.checked=false; emb.disabled=true; $("#embLbl").style.opacity=".55"; if(nota)nota.textContent="  — no aplica a masculino"; }
    else { emb.disabled=false; $("#embLbl").style.opacity="1"; if(nota)nota.textContent=""; }
  }
  function buscarRep(){
    const rep=buscarRepresentante(DB, docFinal("r_tipoDoc","r_ced"));
    const msg=$("#r_msg"); if(!msg) return;
    if(rep){ $("#r_nom").value=rep.repNombre; $("#r_ape").value=rep.repApellido; if(rep.repFechaNac){$("#r_fn").value=rep.repFechaNac; evaluarRep();} if(!repMenorFlag){ msg.style.color="var(--verde)"; msg.textContent="✓ Representante encontrado; datos completados."; } }
    else { msg.style.color="var(--amarillo)"; msg.textContent="No se encontró; completa los datos manualmente."; }
  }
  $("#i_sexo").addEventListener("change",sexoCambia);
  ["#i_menor","#i_noid","#i_sincedula"].forEach(s=>$(s).addEventListener("change",pintar));
  pintar(); sexoCambia();

  $("#fIng").addEventListener("submit",e=>{
    e.preventDefault();
    const btn=e.target.querySelector('button[type=submit]');
    const noId=chk("#i_noid");

    if(noId){
      const desc=val("#i_desc").trim();
      if(!desc){ mostrarAviso("error","Escribe una seña o descripción que permita identificar al paciente."); return; }
      const datos={noIdentificado:true, descripcion:desc};
      const detalle='<b>NO IDENTIFICADO</b><br>Seña: '+esc(desc);
      registrar(btn, {titulo:"Confirmar ingreso (no identificado)", detalle, ok:"Sí, registrar"}, ["pacientes"], ()=>registrarPaciente(DB,datos), {volverA:"ingreso"});
      return;
    }

    const menor=chk("#i_menor"), emb=chk("#i_emb"), sinCed=chk("#i_sincedula");
    const nombre=val("#i_nombre").trim().toUpperCase(), apellido=val("#i_apellido").trim().toUpperCase();
    const sexo=val("#i_sexo"), fn=val("#i_fn");

    if(!nombre||!apellido){ mostrarAviso("error","Nombre y apellido son obligatorios."); return; }
    if(RE_LETRAS.test(nombre)||RE_LETRAS.test(apellido)){ mostrarAviso("error","Nombre y apellido solo pueden contener letras."); return; }
    if(!sexo){ mostrarAviso("error","Selecciona el sexo (femenino o masculino)."); return; }
    if(fn && fn>=isoHoy()){ mostrarAviso("error","La fecha de nacimiento debe ser anterior a hoy."); return; }
    const edad=calcularEdad(fn);
    if(menor && edad!=="" && edad>=18){ mostrarAviso("error","La fecha indica "+edad+" años: no corresponde a un menor de edad."); return; }
    if(emb && sexo==="MASCULINO"){ mostrarAviso("error","Inconsistencia: un paciente masculino no puede estar embarazada."); return; }

    let cedula="";
    if(!menor){ cedula=docFinal("i_tipoDoc","i_cedula"); if(!cedula && !sinCed){ mostrarAviso("error","Indica el documento o marca que el paciente no lo proporciona."); return; } }

    const alertas=[];
    if(edad!=="" && edad>100) alertas.push("La edad ("+edad+" años) es muy alta: verifica la fecha de nacimiento.");
    if(!menor && edad!=="" && edad<18) alertas.push("La edad ("+edad+" años) es menor de 18 pero NO marcaste \"menor de edad\" (se registrará sin representante).");
    if(emb && edad!=="" && edad<12) alertas.push("Marcaste EMBARAZADA con edad de "+edad+" años: combinación inusual.");

    const datos={nombre,apellido,sexo,fechaNacimiento:fn,tipoDocumento:(menor?"":val("#i_tipoDoc")),cedula,menor,embarazada:emb,noIdentificado:false,sinCedula:sinCed};
    if(menor){
      const rNom=val("#r_nom").trim().toUpperCase(), rApe=val("#r_ape").trim().toUpperCase();
      if(repMenorFlag){
        const desc=val("#i_desc").trim();
        if(!desc){ mostrarAviso("error","El representante es menor de edad: describe la situación y quién acompaña al menor."); return; }
        datos.sinRepresentante=true; datos.descripcion=desc;
      } else {
        if(!rNom||!rApe){ mostrarAviso("error","Nombre y apellido del representante son obligatorios."); return; }
        if(RE_LETRAS.test(rNom)||RE_LETRAS.test(rApe)){ mostrarAviso("error","El nombre del representante solo puede contener letras."); return; }
        const rSin=chk("#r_sincedula"), rDoc=rSin?"":docFinal("r_tipoDoc","r_ced");
        if(!rDoc && !rSin){ mostrarAviso("error","Indica el documento del representante o marca que no lo proporciona."); return; }
        const rEdad=val("#r_fn")?calcularEdad(val("#r_fn")):"";
        if(rEdad!=="" && rEdad<18){ mostrarAviso("error","El representante debe ser mayor de edad."); return; }
        datos.repNombre=rNom; datos.repApellido=rApe; datos.repFechaNac=val("#r_fn"); datos.repCedula=rDoc; datos.repSinCedula=rSin; datos.tipoDocumento=rSin?"":val("#r_tipoDoc");
      }
    }

    const docMostrar = menor ? (datos.sinRepresentante?"— (sin representante válido)":((datos.repCedula||"—")+" (rep.)")) : (cedula|| (sinCed?"— (no proporciona)":"—"));
    let detalle='<b>'+esc(nombre+" "+apellido)+'</b><br>Sexo: '+esc(sexo)+(edad!==""?' · Edad: '+edad+' años':'')+'<br>Documento: '+esc(docMostrar)+
      (menor?(datos.sinRepresentante?'<br>Menor SIN representante válido':'<br>Menor · Rep: '+esc((datos.repNombre||"")+" "+(datos.repApellido||""))):'')+(emb?'<br>Embarazada: sí':'');
    if(alertas.length) detalle+='<div class="modal-alerta">⚠️ '+alertas.map(esc).join('<br>⚠️ ')+'<br><br>¿Estás seguro de registrar así?</div>';

    registrar(btn, {titulo:"Confirmar ingreso", detalle, ok:"Sí, registrar"}, ["pacientes"], ()=>registrarPaciente(DB,datos), {volverA:"ingreso"});
  });
}

function toggleArr(arr,v,on){ const i=arr.indexOf(v); if(on&&i<0)arr.push(v); if(!on&&i>=0)arr.splice(i,1); }
function fmtTA(el){
  let d=(el.value||"").replace(/[^0-9]/g,"").slice(0,6); let out=d;
  if(d.length===4) out=d.slice(0,2)+"/"+d.slice(2);
  else if(d.length>=5) out=d.slice(0,3)+"/"+d.slice(3);
  el.value=out;
}
function pintarAlertasVitales(ev){
  const el=$("#t_valert"); if(!el) return;
  const nom={taZ:"Tensión",fc:"Frec. cardíaca",fr:"Frec. respiratoria",temp:"Temperatura",sat:"Saturación O₂"};
  const rojo=[], amar=[];
  Object.keys(nom).forEach(k=>{ const z=ev.zonas&&ev.zonas[k]; if(z==="rojo")rojo.push(nom[k]); else if(z==="amarillo")amar.push(nom[k]); });
  if(!rojo.length && !amar.length){ el.style.display="none"; el.innerHTML=""; return; }
  el.style.display="block";
  el.innerHTML="⚠️ Vitales en alerta: "+(rojo.length?'<b style="color:var(--rojo)">'+rojo.join(", ")+"</b>":"")+(rojo.length&&amar.length?" · ":"")+(amar.length?amar.join(", "):"");
}
function parseTA(v){ const s=v.match(/(\d{2,3})\s*[\/\-]\s*(\d{2,3})/); if(s)return{sys:+s[1],dia:+s[2]}; const u=v.match(/(\d{2,3})/); return u?{sys:+u[1],dia:null}:{sys:null,dia:null}; }
function numf(v){ const n=parseFloat(String(v).replace(",",".")); return isNaN(n)?null:n; }
function evalTriage(){ const ta=parseTA(val("#t_ta")); return motor(triageSel.signos, triageSel.motivos, {sys:ta.sys,dia:ta.dia,fc:numf(val("#t_fc")),fr:numf(val("#t_fr")),temp:numf(val("#t_temp")),sat:numf(val("#t_sat")),esMenor:triageSel.pac?triageSel.pac.esMenor:false,edad:triageSel.pac?triageSel.pac.edad:null}); }
function pintarVitales(ev){ const map={t_ta:"taZ",t_fc:"fc",t_fr:"fr",t_temp:"temp",t_sat:"sat"}; Object.keys(map).forEach(id=>{ const el=$("#"+id); el.classList.remove("vs-verde","vs-amarillo","vs-rojo"); const z=ev.zonas[map[id]]; if(z)el.classList.add("vs-"+z); }); }
function pintarSugerencia(ev){
  const cont=$("#t_sugerencia"); if(!cont) return;
  if(!triageSel.motivos.length || !ev.codigo){ cont.innerHTML=""; return; }
  const zc = ev.codigo==="T"?"traslado":ev.codigo==="R"?"rojo":ev.codigo==="A"?"amarillo":ev.codigo==="V"?"verde":"descartar";
  let html='<div class="sugerencia z-'+zc+'"><div class="cab">Sugerencia automática: '+COD_A_TXT[ev.codigo]+'</div>';
  const notas=ev.notas||[], sa=ev.signosAuto||[];
  if(notas.length||sa.length){ html+='<ul>'+notas.map(n=>'<li>'+esc(n)+'</li>').join(""); if(sa.length)html+='<li>Signo(s) activado(s) por signos vitales: '+sa.join(", ")+'.</li>'; html+='</ul>'; }
  (ev.flags||[]).forEach(fl=>html+='<div class="flag">⏱️ '+esc(fl)+'</div>');
  if(ev.captopril)html+='<div class="captopril">💊 Recurso disponible: CAPTOPRIL vía oral según protocolo del operativo.</div>';
  if(ev.usarPed)html+='<div class="pediatria">👶 Paciente pediátrico ('+ev.edad+' años): FC y FR evaluadas por rangos de edad. La PA pediátrica requiere tablas por edad/talla.</div>';
  html+='<div class="nota">Apoyo a la decisión (matriz NEWS2 + reglas signo×motivo). No sustituye el criterio clínico.</div></div>';
  cont.innerHTML=html;
}

function barrasHTML(obj,color,maxItems,sufijo){
  maxItems=maxItems||10; sufijo=sufijo||"";
  const pares=Object.keys(obj||{}).map(k=>[k,obj[k]]).filter(p=>p[1]>0).sort((a,b)=>b[1]-a[1]).slice(0,maxItems);
  if(!pares.length) return '<div class="vacio">Sin datos todavía.</div>';
  const max=pares[0][1];
  return pares.map(p=>'<div class="barra"><div class="filaB"><span>'+esc(p[0])+'</span><span>'+p[1]+sufijo+'</span></div><div class="pista"><div class="relleno" style="width:'+Math.max(4,Math.round(p[1]/max*100))+'%; background:'+color+'"></div></div></div>').join("");
}
function renderDashboard(c){
  let zoom=null; // etapa seleccionada (drill-down)
  const FASES=[
    {id:"INGRESADO", corto:"Ingreso", ic:"🆕", alerta:n=>n>=8},
    {id:"ESPERA ROJO", corto:"Rojo", ic:"🔴", alerta:n=>n>0},
    {id:"ESPERA AMARILLO", corto:"Amarillo", ic:"🟡", alerta:n=>n>=10},
    {id:"ESPERA VERDE", corto:"Verde", ic:"🟢", alerta:()=>false},
    {id:"ESPERA ESTABILIZACION", corto:"Espera suero", ic:"💧", alerta:n=>n>=5},
    {id:"SUERO EN CURSO", corto:"Suero", ic:"💧", alerta:()=>false},
    {id:"TRASLADO PENDIENTE", corto:"Por trasladar", ic:"🚑", alerta:n=>n>0}
  ];
  function pintar(){
    const d=getDashboard(DB), cc=d.colas, h=d.hoy, r=d.referencias, tot=r.si+r.no+r.pendiente;
    const activos=DB.pacientes.filter(p=>!ESTADOS_FINALES.includes(p.estado)).length;
    const stockCrit=getInventario(DB).filter(it=>Number(it.stock)<=Number(it.minimo)&&Number(it.minimo)>0).length;
    const kpi=(n,v,cl,al)=>'<div class="kpi '+(cl||"")+(al?" alarma":"")+'"><b>'+(v||0)+'</b><span>'+n+'</span></div>';
    const tiempo=(n,min,meta)=>{ if(min==null)return '<div class="tiempo"><b>—</b><small>'+n+'</small></div>'; const cl=meta?(min<=meta?"ok":"lento"):""; return '<div class="tiempo '+cl+'"><b>'+min+' min</b><small>'+n+(meta?" · meta ≤ "+meta:"")+'</small></div>'; };

    // MACRO: pipeline por etapas (tocable = zoom)
    const pipe = FASES.map(f=>{
      const n=cc[f.id]||0, al=f.alerta(n);
      return '<button class="pipe-et'+(al?" alerta":"")+(zoom===f.id?" sel":"")+'" data-fase="'+f.id+'">'+
        '<span class="pipe-n">'+n+'</span><span class="pipe-ic">'+f.ic+'</span><span class="pipe-l">'+f.corto+'</span>'+(al?'<span class="pipe-dot"></span>':'')+'</button>';
    }).join('<span class="pipe-fl">→</span>');

    // MICRO: detalle de la etapa seleccionada
    let detalle="";
    if(zoom){
      const f=FASES.find(x=>x.id===zoom);
      const lista=DB.pacientes.filter(p=>p.estado===zoom).sort((a,b)=>(a.tsMs||0)-(b.tsMs||0));
      detalle='<div class="caja pipe-zoom"><h3>'+f.ic+' '+ESTADO_LABEL[zoom]+' · '+lista.length+'</h3>'+
        (lista.length? lista.map((p,i)=>'<div class="zoom-fila"><span class="la-pos">'+(i+1)+'</span><div class="zoom-main">'+esc(etiquetaPaciente(p))+'<small>ingresó '+esc(p.hora||"")+((p.descripcion||"").trim()?' · 📝 '+esc((p.descripcion||"").split(" | ").pop()):'')+'</small></div></div>').join("")
        : '<div class="vacio">Sin pacientes en esta etapa.</div>')+
        '</div>';
    }

    c.innerHTML='<div class="dash">'+
      '<div class="dash-top"><div class="estado">Actualizado: '+d.actualizado+'</div><div style="display:flex; gap:6px"><button class="btn-refrescar" id="dashTV" title="Modo pantalla completa">⛶ Pantalla</button><button class="btn-refrescar" id="dashRef">↻ Actualizar</button></div></div>'+

      '<div class="kpis kpis-macro">'+
        kpi("Pacientes activos",activos,"azul")+
        kpi("Ingresos hoy",h.ingresos,"azul")+
        kpi("Altas hoy",h.altas,"verde")+
        kpi("Traslados hoy",h.traslados,"morado")+
        kpi("⚠️ Stock crítico",stockCrit,"rojo",stockCrit>0)+
      '</div>'+

      '<h3 class="dash-h">Línea de etapas <small class="mut" style="text-transform:none">(toca una etapa para ver el detalle)</small></h3>'+
      '<div class="pipeline">'+pipe+'</div>'+
      detalle+

      '<h3 class="dash-h">⚠️ Alertas</h3><div class="alertas">'+ (d.alertas.length? d.alertas.map(x=>'<div class="alerta">'+esc(x)+'</div>').join("") : '<div class="sin-alertas">✅ Sin cuellos de botella detectados.</div>') +'</div>'+

      '<h3 class="dash-h">Tiempos promedio de hoy</h3><div class="tiempos">'+ tiempo("Ingreso → Triage",d.tiempos.ingresoTriage,30)+tiempo("Triage → Consulta",d.tiempos.triageConsulta,60)+tiempo("Duración del suero",d.tiempos.duracionSuero,null) +'</div>'+

      '<h3 class="dash-h">Producción de hoy</h3><div class="kpis">'+
        kpi("Triages",h.triages)+kpi("Consultas",h.consultas)+kpi("Sueros",h.sueros)+kpi("Menores",h.menores,"azul")+kpi("Embarazadas",h.embarazadas,"azul")+kpi("Descartados",h.descartados)+kpi("🐾 Vet.",h.consultasVet,"verde")+
      '</div>'+

      '<div class="grid2">'+
        '<div class="caja"><h3>Clasificación de triage (hoy)</h3>'+barrasHTML({ROJO:d.codigosTriage.ROJO,AMARILLO:d.codigosTriage.AMARILLO,VERDE:d.codigosTriage.VERDE,TRASLADO:d.codigosTriage.TRASLADO,DESCARTADO:d.codigosTriage.DESCARTADO},"#4aa3df",5)+'</div>'+
        '<div class="caja"><h3>Motivos más frecuentes (hoy)</h3>'+barrasHTML(d.motivos,"#ffca28",10)+'</div>'+
        '<div class="caja"><h3>Medicamentos entregados (hoy)</h3>'+barrasHTML(d.medicamentos,"#66bb6a",12," und")+'</div>'+
        '<div class="caja"><h3>Traslados y referencias (hoy)</h3>'+barrasHTML({"Efectivas (recibidos)":r.si,"Rechazadas / no completadas":r.no,"Pendientes de confirmar":r.pendiente},"#29b6f6",3)+ (tot>0?'<div class="vacio" style="margin-top:6px">Tasa de referencia efectiva: <b style="color:#e8eef3">'+Math.round(r.si/tot*100)+'%</b> de '+tot+' traslados.</div>':"") +'<h3 style="margin-top:14px">Centros de destino</h3>'+barrasHTML(d.destinos,"#4aa3df",6)+'</div>'+
      '</div>'+
    '</div>';
    $("#dashRef").addEventListener("click",async()=>{ ULTIMO_PULL=0; await refrescarSuave(null); pintar(); });
    $("#dashTV").addEventListener("click",()=>{ const el=document.documentElement; try{ if(!document.fullscreenElement){ (el.requestFullscreen||el.webkitRequestFullscreen||function(){}).call(el); } else { (document.exitFullscreen||document.webkitExitFullscreen||function(){}).call(document); } }catch(e){} });
    $$(".pipe-et").forEach(b=>b.addEventListener("click",()=>{ const f=b.getAttribute("data-fase"); zoom=(zoom===f?null:f); pintar(); }));
  }
  pintar();
  clearInterval(dashTimer); dashTimer=setInterval(()=>{ refrescarSuave(null).then(()=>{ if(moduloActual==="dashboard") pintar(); }); },60000);
}

function etiquetaPaciente(p){
  const edad=p.edad!==""?p.edad+" a":"";
  if(p.noIdentificado) return "NO IDENTIFICADO — "+(p.descripcion||"").split(" | ")[0]+(edad?" ("+edad+")":"");
  return nombreCompleto(p)+(edad?" · "+edad:"")+(p.menor?" · menor":"")+(p.cedula&&!p.menor?" · "+p.cedula:"");
}
function renderPacientes(c){
  const fases=[ESTADO.INGRESADO,ESTADO.ESPERA_ROJO,ESTADO.ESPERA_AMARILLO,ESTADO.ESPERA_VERDE,ESTADO.ESPERA_ESTABILIZACION,ESTADO.SUERO_EN_CURSO,ESTADO.TRASLADO_PENDIENTE];
  const todos=[...fases, ESTADO.ALTA, ESTADO.TRASLADADO, ESTADO.DESCARTADO];
  const activos=DB.pacientes.filter(p=>!ESTADOS_FINALES.includes(p.estado));
  const opts=(sel)=>todos.map(s=>'<option value="'+s+'"'+(s===sel?" selected":"")+'>'+ESTADO_LABEL[s]+'</option>').join("");
  function card(p){
    const sit=(p.descripcion||"").trim();
    return '<div class="pc-card">'+
      '<div class="pc-top"><div class="pc-nom">'+esc(etiquetaPaciente(p))+'</div><div class="pc-hora">ingresó '+esc(p.hora||"")+'</div></div>'+
      (sit?'<div class="pc-sit">📝 '+esc(sit)+'</div>':'')+
      '<details class="pc-det"><summary>Gestionar</summary>'+
        '<label style="margin-top:8px">Cambiar a</label><select class="pc-sel">'+opts(p.estado)+'</select>'+
        '<label>Novedad / observación (opcional)</label><textarea class="pc-obs" placeholder="Ej.: estable, se traslada al hospital X; o corrección de estado"></textarea>'+
        '<button type="button" class="btn pc-save" data-id="'+p.id+'">Guardar cambio</button>'+
      '</details></div>';
  }
  let html='<div class="tarjeta"><h2>Pacientes activos</h2><p class="desc">Cambia de fase, corrige un estado puesto por error o registra una novedad. <b>'+activos.length+'</b> activos.</p>'+avisoHTML()+'</div>';
  fases.forEach(f=>{
    const g=activos.filter(p=>p.estado===f).sort((a,b)=>(a.tsMs||0)-(b.tsMs||0));
    if(!g.length) return;
    html+='<div class="tarjeta"><h3 style="margin:0 0 8px">'+ESTADO_LABEL[f]+' · '+g.length+'</h3>'+g.map(card).join("")+'</div>';
  });
  if(!activos.length) html+='<div class="tarjeta"><div class="vacio">No hay pacientes activos ahora mismo.</div></div>';
  c.innerHTML=html;
  $$(".pc-save").forEach(btn=>btn.addEventListener("click",async()=>{
    const id=btn.getAttribute("data-id"); const p=DB.pacientes.find(x=>x.id===id); if(!p) return;
    const det=btn.closest(".pc-det"); const nuevo=det.querySelector(".pc-sel").value; const obs=det.querySelector(".pc-obs").value.trim();
    if(nuevo===p.estado && !obs){ mostrarAviso("warn","No cambiaste el estado ni escribiste una novedad."); return; }
    const detalle='<b>'+esc(etiquetaPaciente(p))+'</b><br>De: '+ESTADO_LABEL[p.estado]+'<br>A: <b>'+ESTADO_LABEL[nuevo]+'</b>'+(obs?'<br>Novedad: '+esc(obs):'');
    const ok=await confirmar("Confirmar cambio de estado", detalle, {ok:"Sí, guardar"}); if(!ok) return;
    btn.disabled=true;
    p.estado=nuevo; p.actualizado=ahoraStr();
    if(obs) p.descripcion=(p.descripcion?p.descripcion+" | ":"")+horaAhora()+" ["+usuarioActual.usuario+"] "+obs;
    try{ await commitAll(["pacientes"]); renderModulo("pacientes",{tipo:"ok",msg:"Estado actualizado."}); }
    catch(e){ renderModulo("pacientes",{tipo:"warn",msg:e.message}); }
  }));
}

/* --------- ESTADO DE LA PLATAFORMA (admin) --------- */
function renderEstado(c){
  const txt = MODO==="local"
    ? "Modo LOCAL: los datos se guardan solo en este dispositivo (API_URL vacío)."
    : (CONN_OK ? "Conectado al Google Sheet." : (CONN_ERR ? ("Sin conexión al Sheet.\n"+CONN_ERR) : "Conexión aún no verificada."));
  c.innerHTML='<div class="tarjeta"><h2>Estado de la plataforma</h2>'+
    '<p class="desc">Modo actual: <b>'+MODO+'</b></p>'+
    '<div style="font-size:11px; word-break:break-all; color:#607080; margin-bottom:8px">URL: '+esc(API_URL||"(no definida)")+'</div>'+
    '<div id="stOut" class="aviso '+(CONN_OK?"ok":"warn")+'" style="display:block; white-space:pre-wrap">'+esc(txt)+'</div>'+
    '<div style="display:flex; gap:8px; margin-top:10px"><button class="btn-sec" id="stPing" style="flex:1">Probar conexión</button><button class="btn-sec" id="stDiag" style="flex:1">Ver mapeo de hojas</button></div>'+
    '<div id="stDetail" style="display:none; margin-top:10px; font-size:12px; white-space:pre-wrap; word-break:break-word"></div>'+
    '</div>';
  $("#stPing").addEventListener("click",async()=>{
    const out=$("#stDetail"), b=$("#stPing"); out.style.display="block";
    if(MODO==="local"){ out.style.color="#8a6100"; out.textContent="Estás en modo local (API_URL vacío)."; return; }
    b.disabled=true; const t=b.textContent; b.textContent="Probando…"; out.style.color="#607080"; out.textContent="Contactando…";
    const r=await pingRemoto(); b.disabled=false; b.textContent=t;
    if(r.ok){ out.style.color="var(--verde)"; out.textContent="✓ Conexión correcta.\nHoja: "+(r.info.spreadsheet||"?")+"\nPestañas: "+(r.info.hojas||"?")+"\nBackend: "+(r.info.backend||"?"); }
    else { out.style.color="var(--rojo)"; out.textContent="✗ No conecta.\n"+(r.error||"")+(r.status?("\nHTTP "+r.status):"")+(r.muestra?("\n\n"+r.muestra):""); }
  });
  $("#stDiag").addEventListener("click",async()=>{
    const out=$("#stDetail"), b=$("#stDiag"); out.style.display="block";
    if(MODO==="local"){ out.style.color="#8a6100"; out.textContent="Sin conexión (modo local)."; return; }
    b.disabled=true; const t=b.textContent; b.textContent="Consultando…"; out.style.color="#607080"; out.textContent="Leyendo mapeo…";
    const r=await diagnoseRemoto(); b.disabled=false; b.textContent=t;
    if(!r.ok){ out.style.color="var(--rojo)"; out.textContent="No se pudo leer el mapeo.\n"+(r.error||""); return; }
    out.style.color="#33454f";
    const lineas=(r.info.hojas||[]).map(h=>{
      let s="• "+h.pestana+(h.mapeadaComo?(" → "+h.mapeadaComo):"")+" ("+h.filas+" filas)";
      if(h.chequeo && h.chequeo.faltan && h.chequeo.faltan.length) s+="\n   ⚠️ faltan: "+h.chequeo.faltan.join(", ");
      return s;
    });
    out.textContent="Hoja: "+r.info.spreadsheet+"\nPestañas: "+r.info.totalHojas+"\n\n"+lineas.join("\n");
  });
}

/* ==================== ARRANQUE ==================== */
(async function init(){
  // Carga LOCAL instantánea (no bloquea por la red)
  TABLAS.forEach(t=>{ try{ const raw=localGet("hcrm:"+t); DB[t]=raw?JSON.parse(raw).map(f=>coerce(t,f)):[]; }catch(e){ DB[t]=[]; } });
  if(!DB.usuarios || !DB.usuarios.length) DB.usuarios = USUARIOS_SEMILLA.map(u=>({...u}));
  renderLogin();
  // Sincroniza con el Sheet en segundo plano (si hay API_URL)
  if(MODO==="sheet"){
    pullRemoto()
      .then(()=>{ CONN_OK=true; CONN_ERR=null; if(!DB.usuarios||!DB.usuarios.length) DB.usuarios=USUARIOS_SEMILLA.map(u=>({...u})); if(!usuarioActual) renderLogin(); })
      .catch(e=>{ CONN_OK=false; CONN_ERR=e.message; });
  }
})();
</script>
